site_name: VCCSD Docs Pro
site_description: Production-ready docs starter with search, i18n, versioning and blog.
site_url: https://USERNAME.github.io/REPO/
repo_url: https://github.com/USERNAME/REPO
repo_name: REPO
edit_uri: edit/main/docs/
use_directory_urls: true

theme:
  name: material
  language: cs
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg
  palette:
    - scheme: slate
      primary: slate
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.tabs.link

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      auto_title: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.critic

plugins:
  - search

nav:
  - Domů: cs/index.md
  - Docs:
      - Start: cs/getting-started.md
      - Funkce: cs/features/index.md
      - Blog: cs/blog/index.md
      - API: cs/api/index.md
      - Verze: versions/index.md
  - EN:
      - Home: en/index.md
      - Start: en/getting-started.md
      - Features: en/features/index.md
      - Blog: en/blog/index.md
      - API: en/api/index.md
      - Versions: en/versions/index.md

extra:
  generator: false

extra_css:
  - assets/css/custom.css

extra_javascript:
  - assets/js/site-meta.js
  - assets/js/app.js
  - assets/js/openapi.js
  - assets/js/mermaid-lite.js
