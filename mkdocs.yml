site_name: VCCSD Docs
site_description: Production documentation starter with a shadcn-inspired dark UI.
site_url: https://USERNAME.github.io/REPO/
repo_url: https://github.com/USERNAME/REPO
repo_name: REPO
edit_uri: edit/main/docs/
use_directory_urls: true

theme:
  name: material
  language: cs
  palette:
    - scheme: slate
      primary: slate
      accent: indigo
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.share
    - content.tabs.link
    - content.action.edit

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: Obsah stránky
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      auto_title: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - assets/custom.css

extra_javascript:
  - assets/app.js

nav:
  - Domů: index.md
  - Start:
      - Rychlý start: getting-started.md
      - Struktura projektu: architecture.md
  - Komponenty:
      - Přehled: components.md
      - Code blocks: code-blocks.md
      - Language toggle: language-toggle.md
  - Reference:
      - Přehled: reference.md
      - FAQ: faq.md
      - Release notes: releases.md
      - Changelog: changelog.md
