site_name: ShadDocs Dark
site_description: Dark shadcn-inspired documentation system for MkDocs.
theme:
  name: material
  custom_dir: overrides
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/book-open-page-variant
  palette:
  - scheme: slate
    primary: black
    accent: indigo
  features:
  - navigation.instant
  - navigation.tracking
  - navigation.top
  - navigation.sections
  - navigation.indexes
  - toc.follow
  - content.code.copy
  - content.code.annotate
  - search.highlight
  - search.share
plugins:
- search
- glightbox
- minify:
    minify_html: true
markdown_extensions:
- admonition
- attr_list
- def_list
- footnotes
- md_in_html
- tables
- pymdownx.highlight:
    anchor_linenums: true
    line_spans: __span
    pygments_lang_class: true
- pymdownx.superfences
- pymdownx.tabbed:
    alternate_style: true
- pymdownx.details
- pymdownx.inlinehilite
extra_css:
- assets/css/theme.css
extra_javascript:
- assets/js/app.js
nav:
- Home: index.md
- Česky:
  - Start: cs/index.md
  - Architecture: cs/architecture.md
  - Code blocks: cs/code-blocks.md
  - Loading: cs/loading.md
  - Scrolling: cs/scrolling.md
  - Release notes: cs/release-notes.md
- English:
  - Start: en/index.md
  - Architecture: en/architecture.md
  - Code blocks: en/code-blocks.md
  - Loading: en/loading.md
  - Scrolling: en/scrolling.md
  - Release notes: en/release-notes.md
