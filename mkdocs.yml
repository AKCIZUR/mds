site_name: Minimalist MkDocs Release
site_description: Minimalist bilingual documentation starter for GitHub Pages.
site_url: https://USERNAME.github.io/REPO/
repo_url: https://github.com/USERNAME/REPO
repo_name: REPO
edit_uri: edit/main/docs/
use_directory_urls: true
watch:
  - docs
  - overrides

theme:
  name: material
  custom_dir: overrides
  language: cs
  palette:
    - scheme: slate
      primary: slate
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Light mode
    - scheme: default
      primary: slate
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit

plugins:
  - search
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      js_files:
        - assets/app.js
      css_files:
        - assets/custom.css
      cache_safe: true
  - glightbox
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: Obsah stránky
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      auto_title: false
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - assets/custom.css

extra_javascript:
  - assets/app.js

