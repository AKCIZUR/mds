site_name: VCCSD Docs Dark
site_description: Shadcn-inspired dark documentation starter for GitHub Pages.
site_url: https://USERNAME.github.io/REPO/
repo_url: https://github.com/USERNAME/REPO
repo_name: REPO
edit_uri: edit/main/docs/
use_directory_urls: true

site_author: VCCSD
copyright: Copyright &copy; 2026 VCCSD

theme:
  name: shadcn
  show_title: true
  show_stargazers: false
  topbar_sections: false
  show_datetime: false
  pygments_style:
    light: shadcn-light
    dark: github-dark

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: Obsah stránky
  - pymdownx.highlight:
      anchor_linenums: true
      auto_title: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.details

plugins:
  - search

extra_css:
  - assets/custom.css

nav:
  - Domů: index.md
  - Start:
      - Rychlý start: getting-started.md
      - Design system: design-system.md
      - Layout a navigace: navigation.md
  - UI a obsah:
      - Code blocks: code.md
      - Komponenty: components.md
      - Performance: performance.md
  - Reference:
      - Přehled: reference.md
      - FAQ: faq.md
      - Release notes: releases.md
      - Changelog: changelog.md
